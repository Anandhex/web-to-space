<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IR Parser View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #13161d;
        --surface-2: #1a1e28;
        --border: #252a38;
        --border-bright: #333a50;
        --ink: #e2e6f0;
        --muted: #5a6278;
        --accent: #4f8eff;
        --accent-dim: rgba(79, 142, 255, 0.12);
        --accent-border: rgba(79, 142, 255, 0.3);
        --tag-bg: #1e2535;
        --tag-ink: #7a8aaa;
        --mono: "IBM Plex Mono", monospace;
        --sans: "Syne", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        min-height: 100vh;
        display: grid;
        grid-template-rows: 52px 1fr 52px;
        height: 100vh;
        overflow: hidden;
      }

      /* ── top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .brand {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        white-space: nowrap;
      }

      .url-wrap {
        flex: 1;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .url-input {
        flex: 1;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s;
      }
      .url-input:focus {
        border-color: var(--accent-border);
      }

      .load-btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 7px 14px;
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        transition: opacity 0.15s;
      }
      .load-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .status {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status .ok {
        color: #4ade80;
      }
      .status .err {
        color: #f87171;
      }

      /* ── main layout ── */
      .workspace {
        display: grid;
        grid-template-columns: 220px 1fr 260px;
        overflow: hidden;
      }

      /* ── panels ── */
      .panel {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        overflow: hidden;
      }
      .panel:last-child {
        border-right: none;
      }

      .panel-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        background: var(--surface);
        flex-shrink: 0;
      }

      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      /* ── toc ── */
      .toc-entry {
        display: block;
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        border-radius: 5px;
        padding: 6px 8px;
        font-family: var(--sans);
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        transition:
          color 0.1s,
          background 0.1s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .toc-entry:hover {
        color: var(--ink);
        background: var(--surface-2);
      }
      .toc-entry.active {
        color: var(--accent);
        background: var(--accent-dim);
        font-weight: 700;
      }
      .toc-children {
        padding-left: 10px;
        border-left: 1px solid var(--border);
        margin-left: 8px;
      }

      /* ── content nodes ── */
      .node {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
        background: var(--surface);
        font-size: 13px;
        line-height: 1.55;
      }

      .node-role {
        display: inline-block;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--tag-ink);
        background: var(--tag-bg);
        border-radius: 3px;
        padding: 2px 5px;
        margin-bottom: 5px;
      }

      .node-label {
        color: var(--ink);
        font-size: 13px;
        line-height: 1.5;
      }

      /* role-specific accent colours on the left border */
      .node[data-role="heading"] {
        border-left: 3px solid var(--accent);
      }
      .node[data-role="link"] {
        border-left: 3px solid #a78bfa;
      }
      .node[data-role="button"] {
        border-left: 3px solid #34d399;
      }
      .node[data-role="img"] {
        border-left: 3px solid #f59e0b;
      }
      .node[data-role="list"] {
        border-left: 3px solid #64748b;
      }
      .node[data-role="table"] {
        border-left: 3px solid #22d3ee;
      }
      .node[data-role="blockquote"] {
        border-left: 3px solid #fb923c;
      }
      .node[data-role="code"] {
        border-left: 3px solid #4ade80;
      }
      .node[data-role="form"] {
        border-left: 3px solid #f472b6;
      }
      .node[data-role="separator"] {
        border-left: 3px solid var(--border-bright);
      }
      .node[data-role="region"] {
        border-left: 3px solid #818cf8;
        border-style: dashed;
      }

      /* heading levels */
      .heading-1 {
        font-size: 20px;
        font-weight: 800;
      }
      .heading-2 {
        font-size: 16px;
        font-weight: 700;
      }
      .heading-3 {
        font-size: 14px;
        font-weight: 700;
      }
      .heading-4,
      .heading-5,
      .heading-6 {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }

      .node-img {
        max-width: 100%;
        border-radius: 6px;
        margin-top: 6px;
        display: block;
      }

      .node-link {
        color: #818cf8;
        font-family: var(--mono);
        font-size: 12px;
        word-break: break-all;
      }

      pre.node-code {
        background: #0a0c12;
        border-radius: 6px;
        padding: 8px;
        font-family: var(--mono);
        font-size: 11px;
        color: #93c5fd;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        margin-top: 4px;
      }

      blockquote.node-bq {
        border-left: 3px solid #fb923c;
        padding-left: 10px;
        color: #9ca3af;
        font-style: italic;
        margin-top: 4px;
      }

      /* children indent for nested nodes */
      .node-children {
        margin-top: 8px;
        padding-left: 10px;
        border-left: 1px dashed var(--border);
      }

      hr.node-hr {
        border: none;
        border-top: 1px solid var(--border-bright);
        margin: 4px 0;
      }

      /* table */
      table.node-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 6px;
        font-size: 12px;
      }
      table.node-table td,
      table.node-table th {
        border: 1px solid var(--border);
        padding: 5px 8px;
        text-align: left;
      }
      table.node-table th {
        background: var(--surface-2);
        color: var(--muted);
        font-weight: 600;
      }

      .empty-state {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        padding: 12px 0;
      }

      /* ── tabs bar ── */
      .tabsbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 12px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .tabsbar::-webkit-scrollbar {
        display: none;
      }

      .tab {
        flex-shrink: 0;
        background: none;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 5px 10px;
        font-family: var(--sans);
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition:
          color 0.1s,
          border-color 0.1s;
        white-space: nowrap;
      }
      .tab:hover {
        color: var(--ink);
        border-color: var(--border-bright);
      }
      .tab.active {
        color: var(--accent);
        border-color: var(--accent-border);
        background: var(--accent-dim);
      }

      @media (max-width: 820px) {
        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto auto;
        }
        body {
          height: auto;
          overflow: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">IR·View</span>
      <div class="url-wrap">
        <input
          id="urlInput"
          class="url-input"
          value="https://developer.mozilla.org/en-US/blog/mdn-turns-20/"
          aria-label="URL to parse"
        />
        <button id="loadBtn" class="load-btn">Parse</button>
      </div>
      <div class="status" id="statusLine">ready</div>
    </header>

    <main class="workspace">
      <nav class="panel" aria-label="Table of contents">
        <div class="panel-head">TOC</div>
        <div class="panel-body" id="tocContainer"></div>
      </nav>

      <section class="panel" aria-label="Active section content">
        <div class="panel-head" id="centerHead">Content</div>
        <div class="panel-body" id="centerContent"></div>
      </section>

      <aside class="panel" aria-label="Section metadata">
        <div class="panel-head">Node info</div>
        <div class="panel-body" id="asideContent"></div>
      </aside>
    </main>

    <footer class="tabsbar" id="tabsBar" aria-label="Sections"></footer>

    <script type="module">
      import { parsePageToIR } from "/src/ir/parser.ts";
      import { mapIRToScene } from "/src/mapper/mapper.ts";
      import {
        computeLayoutPlan,
        mergeLayoutPlan,
        QUEST_PRO_PROFILE,
      } from "/src/layout/engine.ts";

      // ── state ─────────────────────────────────────────────────────────────
      let ir = null; // raw PageIR from parser
      let activeId = null; // currently selected section node id

      // ── dom refs ──────────────────────────────────────────────────────────
      const $toc = document.getElementById("tocContainer");
      const $center = document.getElementById("centerContent");
      const $aside = document.getElementById("asideContent");
      const $tabs = document.getElementById("tabsBar");
      const $head = document.getElementById("centerHead");
      const $status = document.getElementById("statusLine");
      const $url = document.getElementById("urlInput");
      const $btn = document.getElementById("loadBtn");

      // ── helpers ───────────────────────────────────────────────────────────
      function label(node, fallback = node?.id ?? "—") {
        return (node?.label ?? "").trim() || fallback;
      }

      function resolveUrl(src) {
        if (!src) return null;
        try {
          return new URL(src, ir?.meta?.url ?? location.href).href;
        } catch {
          return src;
        }
      }

      function setStatus(msg, type = "") {
        $status.innerHTML = `<span class="${type}">${msg}</span>`;
      }

      // ── top-level section ids (children of "main") ────────────────────────
      function sectionIds() {
        const mainNode = ir?.nodes?.["main"];
        return mainNode?.children ?? [];
      }

      // ── render a single IRNode as a DOM element ───────────────────────────
      // This is the ONLY place that knows how to display a node.
      // It trusts role and children entirely from the IR.
      function renderNode(nodeId) {
        const node = ir.nodes[nodeId];
        if (!node) return null;

        const wrap = document.createElement("div");
        wrap.className = "node";
        wrap.dataset.role = node.role;

        const roleTag = document.createElement("span");
        roleTag.className = "node-role";
        roleTag.textContent = node.role + (node.level ? ` h${node.level}` : "");
        wrap.appendChild(roleTag);

        // ── role-specific content ──────────────────────────────────────────
        switch (node.role) {
          case "heading": {
            const el = document.createElement("div");
            el.className = `node-label heading-${node.level ?? 1}`;
            el.textContent = label(node);
            wrap.appendChild(el);
            break;
          }

          case "paragraph":
          case "generic": {
            const el = document.createElement("div");
            el.className = "node-label";
            el.textContent = label(node);
            wrap.appendChild(el);
            break;
          }

          case "link": {
            const a = document.createElement("a");
            a.className = "node-link";
            a.href = resolveUrl(node.attributes?.href) ?? "#";
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            // If the link has children they carry the content — show only the
            // href as the identifier. Only fall back to label() for childless links.
            a.textContent = node.children?.length
              ? (node.attributes?.href ?? "link")
              : label(node, node.attributes?.href ?? "link");
            wrap.appendChild(a);
            break;
          }

          case "button": {
            const el = document.createElement("div");
            el.className = "node-label";
            el.textContent = `⬡ ${label(node)}`;
            wrap.appendChild(el);
            break;
          }

          case "img": {
            const src = resolveUrl(node.attributes?.src);
            if (src) {
              const img = document.createElement("img");
              img.className = "node-img";
              img.src = src;
              img.alt = node.attributes?.alt ?? "";
              img.loading = "lazy";
              wrap.appendChild(img);
            }
            // Only show a caption when the img has a real alt text — skip
            // filename fallbacks produced by the parser for decorative images.
            const realAlt = (node.attributes?.alt ?? "").trim();
            if (realAlt) {
              const cap = document.createElement("div");
              cap.className = "node-label";
              cap.style.color = "var(--muted)";
              cap.style.fontSize = "11px";
              cap.textContent = realAlt;
              wrap.appendChild(cap);
            }
            break;
          }

          case "figure": {
            // let children render below
            const cap = document.createElement("div");
            cap.className = "node-label";
            cap.textContent = label(node);
            wrap.appendChild(cap);
            break;
          }

          case "blockquote": {
            const bq = document.createElement("blockquote");
            bq.className = "node-bq";
            bq.textContent = label(node);
            wrap.appendChild(bq);
            break;
          }

          case "code": {
            const pre = document.createElement("pre");
            pre.className = "node-code";
            pre.textContent = label(node);
            wrap.appendChild(pre);
            break;
          }

          case "separator": {
            const hr = document.createElement("hr");
            hr.className = "node-hr";
            wrap.appendChild(hr);
            break;
          }

          case "list": {
            // children (listitems) rendered recursively below
            const lbl = document.createElement("div");
            lbl.className = "node-label";
            lbl.style.color = "var(--muted)";
            lbl.style.fontSize = "11px";
            lbl.textContent = `list · ${node.children?.length ?? 0} items`;
            wrap.appendChild(lbl);
            break;
          }

          case "listitem": {
            const el = document.createElement("div");
            el.className = "node-label";
            el.textContent = label(node);
            wrap.appendChild(el);
            break;
          }

          case "table": {
            const tbl = document.createElement("table");
            tbl.className = "node-table";
            for (const rowId of node.children ?? []) {
              const rowNode = ir.nodes[rowId];
              if (!rowNode) continue;
              const tr = document.createElement("tr");
              for (const cellId of rowNode.children ?? []) {
                const cellNode = ir.nodes[cellId];
                const el = document.createElement(
                  cellNode?.role === "columnheader" ? "th" : "td",
                );
                el.textContent = label(cellNode, cellId);
                tr.appendChild(el);
              }
              tbl.appendChild(tr);
            }
            wrap.appendChild(tbl);
            // table already fully rendered — skip generic child recursion
            return wrap;
          }

          case "textbox":
          case "combobox":
          case "checkbox":
          case "radio":
          case "slider":
          case "switch": {
            const el = document.createElement("div");
            el.className = "node-label";
            el.style.fontFamily = "var(--mono)";
            el.style.fontSize = "12px";
            el.textContent = `[${node.role}] ${label(node)}`;
            wrap.appendChild(el);
            break;
          }

          case "navigation":
          case "form":
          case "region":
          case "group":
          default: {
            // container node: just show label if present; children render below
            if (node.label) {
              const el = document.createElement("div");
              el.className = "node-label";
              el.style.color = "var(--muted)";
              el.textContent = label(node);
              wrap.appendChild(el);
            }
            break;
          }
        }

        // ── recurse into children (except table which returned early) ──────
        if (node.children?.length) {
          const childWrap = document.createElement("div");
          childWrap.className = "node-children";
          for (const childId of node.children) {
            const childEl = renderNode(childId);
            if (childEl) childWrap.appendChild(childEl);
          }
          wrap.appendChild(childWrap);
        }

        return wrap;
      }

      // ── render TOC tree ───────────────────────────────────────────────────
      function renderTOCNode(tocNode, depth = 0) {
        const frag = document.createDocumentFragment();

        if (tocNode.id !== "main" && tocNode.id !== "landmarks") {
          const btn = document.createElement("button");
          btn.className =
            "toc-entry" + (tocNode.id === activeId ? " active" : "");
          btn.textContent = tocNode.label ?? tocNode.id;
          btn.style.paddingLeft = `${8 + depth * 10}px`;
          btn.addEventListener("click", () => {
            activeId = tocNode.id;
            render();
          });
          frag.appendChild(btn);
        }

        if (tocNode.children?.length) {
          const childWrap = document.createElement("div");
          childWrap.className = depth > 0 ? "toc-children" : "";
          for (const child of tocNode.children) {
            childWrap.appendChild(renderTOCNode(child, depth + 1));
          }
          frag.appendChild(childWrap);
        }

        const wrapper = document.createElement("div");
        wrapper.appendChild(frag);
        return wrapper;
      }

      // ── render aside: node metadata for active section ────────────────────
      function renderAside(nodeId) {
        $aside.innerHTML = "";
        const node = ir?.nodes?.[nodeId];
        if (!node) {
          $aside.innerHTML = `<p class="empty-state">—</p>`;
          return;
        }

        const rows = [
          ["id", node.id],
          ["role", node.role],
          ["source", node.source],
          ["landmark", node.landmark ? "yes" : "no"],
          ["children", node.children?.length ?? 0],
          ["label", (node.label ?? "").slice(0, 80) || "—"],
          ["parent", node.parent ?? "—"],
        ];

        const tbl = document.createElement("table");
        tbl.className = "node-table";
        tbl.style.fontSize = "11px";
        for (const [k, v] of rows) {
          const tr = document.createElement("tr");
          const th = document.createElement("th");
          th.textContent = k;
          const td = document.createElement("td");
          td.textContent = String(v);
          td.style.fontFamily = "var(--mono)";
          tr.appendChild(th);
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
        $aside.appendChild(tbl);

        // attrs section
        const attrs = node.attributes ?? {};
        const attrKeys = Object.keys(attrs).filter((k) => attrs[k] !== null);
        if (attrKeys.length) {
          const h = document.createElement("div");
          h.className = "panel-head";
          h.style.margin = "10px 0 4px";
          h.textContent = "attributes";
          $aside.appendChild(h);

          const atbl = document.createElement("table");
          atbl.className = "node-table";
          atbl.style.fontSize = "11px";
          for (const k of attrKeys) {
            const tr = document.createElement("tr");
            const th = document.createElement("th");
            th.textContent = k;
            const td = document.createElement("td");
            td.textContent = String(attrs[k]).slice(0, 80);
            td.style.fontFamily = "var(--mono)";
            tr.appendChild(th);
            tr.appendChild(td);
            atbl.appendChild(tr);
          }
          $aside.appendChild(atbl);
        }
      }

      // ── tabs ──────────────────────────────────────────────────────────────
      function renderTabs(ids) {
        $tabs.innerHTML = "";
        for (const id of ids) {
          const node = ir.nodes[id];
          const btn = document.createElement("button");
          btn.className = "tab" + (id === activeId ? " active" : "");
          btn.textContent = label(node, id);
          btn.addEventListener("click", () => {
            activeId = id;
            render();
          });
          $tabs.appendChild(btn);
        }
      }

      // ── main render ───────────────────────────────────────────────────────
      function render() {
        if (!ir) return;

        const ids = sectionIds();

        // TOC
        $toc.innerHTML = "";
        $toc.appendChild(renderTOCNode(ir.landmarks));

        // Tabs
        renderTabs(ids);

        // Center: render children of active section node directly
        $center.innerHTML = "";
        const activeNode = ir.nodes[activeId];
        if (!activeNode) {
          $center.innerHTML = `<p class="empty-state">Select a section.</p>`;
        } else {
          $head.textContent = label(activeNode, activeId);
          for (const childId of activeNode.children ?? []) {
            const el = renderNode(childId);
            if (el) $center.appendChild(el);
          }
          if (!activeNode.children?.length) {
            $center.innerHTML = `<p class="empty-state">No child nodes.</p>`;
          }
        }

        // Aside: metadata of active section node
        renderAside(activeId);
      }

      // ── load & parse ──────────────────────────────────────────────────────
      async function load() {
        const url = $url.value.trim();
        if (!url) {
          setStatus("enter a url", "err");
          return;
        }
        try {
          $btn.disabled = true;
          setStatus("fetching…");
          const res = await fetch(`/proxy?url=${encodeURIComponent(url)}`);
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          const html = await res.text();
          setStatus("parsing…");
          ir = await parsePageToIR(html, url);
          const mappedScene = mapIRToScene(ir, {
            generateTOC: true,
            generateTOCAlways: true,
            viewingDistance: 0,
            comfortHalfAngleDeg: 0,
            panelCurveRadius: 0,
            eyeLevelOffset: 0,
            lowConfidenceThreshold: 0,
            elidePresentation: false,
            minCardGridItems: 0,
            maxPanelChildren: 0,
            cardWidth: 0,
            panelWidth: 0,
            maxCardColumns: 0,
          });
          console.log("Parsed IR:", ir);
          console.log("Mapped Scene:", mappedScene);
          const layoutPlan = computeLayoutPlan(mappedScene, QUEST_PRO_PROFILE);
          console.log("Layout Plan:", layoutPlan);
          const mergedPlan = mergeLayoutPlan(mappedScene, layoutPlan);
          console.log("Merged Layout Plan:", mergedPlan);
          window.currentIR = ir;
          const ids = sectionIds();
          activeId = ids[0] ?? null;
          setStatus(
            `<span class="ok">✓</span> ${Object.keys(ir.nodes).length} nodes · ${ids.length} sections`,
          );
          render();
        } catch (e) {
          console.error(e);
          setStatus(String(e), "err");
        } finally {
          $btn.disabled = false;
        }
      }

      $btn.addEventListener("click", load);
      $url.addEventListener("keydown", (e) => {
        if (e.key === "Enter") load();
      });
      setStatus("ready");
      await load();
    </script>
  </body>
</html>
